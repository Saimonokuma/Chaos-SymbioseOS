# ═══════════════════════════════════════════════════════════════════════════════
# CHAOS-SYMBIOSE OS — CI/CD Forge Pipeline
# File: .github/workflows/forge-apbx.yml
# Ref:  Interactive_Plan.md §II (CI/CD FORGE & PIPELINE ARCHITECTURE)
#
# Sequential pipeline using Dockerfile.build for cross-compilation:
#   CI-001: Docker build (BZIMAGE, hive_mind, symbiose_ircd, ChaosLoader.exe,
#           symbiose_ircd.exe, initrd.img)
#   CI-002: Validate KMDF driver sources (WDK build requires local env)
#   CI-005: Build SymbioseTerminal.exe (Tauri 2.0 / Rust + React)
#   CI-004a: Assemble APBX playbook package
#   CI-004b: Seal .apbx archive (7z LZMA2 + AES-256)
#
# Runners: GitHub-hosted ubuntu-latest + windows-latest
# Triggers: push to main/release/*, PR to main, manual dispatch
# ═══════════════════════════════════════════════════════════════════════════════

name: "Forge APBX — SymbioseOS Build Pipeline"

on:
  push:
    branches: [main, "release/*"]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# ENV: Shared constants across all jobs
# ─────────────────────────────────────────────────────────────────────────────
env:
  STAGING_DIR: "04_APBX_Transmigration/playbook"
  APBX_PASSWORD: "malte"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: build-docker (CI-001 + CI-002 + CI-003)
  # Uses 05_Integration_Tests/Dockerfile.build to compile 6 binaries:
  #   1. BZIMAGE        (Linux kernel v6.12, from kernel.org + symbiose_defconfig)
  #   2. hive_mind      (musl-static, guest PID 1)
  #   3. symbiose_ircd  (musl-static, guest IRC daemon)
  #   4. ChaosLoader.exe (MinGW-w64 cross-compile)
  #   5. symbiose_ircd.exe (MinGW-w64 cross-compile)
  #   6. initrd.img     (cpio+gzip newc archive)
  # ═══════════════════════════════════════════════════════════════════════════
  build-docker:
    name: "CI-001 · Docker Build (6 binaries)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build all targets via Dockerfile.build
        run: |
          echo "══════════════════════════════════════════════════"
          echo "  Building 6 binaries via Dockerfile.build"
          echo "══════════════════════════════════════════════════"
          docker build \
            -f 05_Integration_Tests/Dockerfile.build \
            -t symbiose-build \
            .

      - name: Extract build artifacts from Docker
        run: |
          # Create a temporary container and copy outputs
          docker create --name symbiose-extract symbiose-build
          mkdir -p build/
          docker cp symbiose-extract:/output/. build/
          docker rm symbiose-extract

          echo ""
          echo "══════════════════════════════════════════════════"
          echo "  Build Artifacts"
          echo "══════════════════════════════════════════════════"
          ls -lh build/
          echo ""
          file build/*

          # Verify all 6 outputs exist
          for f in BZIMAGE hive_mind symbiose_ircd ChaosLoader.exe symbiose_ircd.exe initrd.img; do
            if [ ! -f "build/$f" ]; then
              echo "MISSING: build/$f"
              exit 1
            fi
            echo "[OK] build/$f ($(stat -c%s "build/$f") bytes)"
          done
          echo ""
          echo "All 6 binaries built successfully."

      - uses: actions/upload-artifact@v4
        with:
          name: docker-binaries
          path: |
            build/BZIMAGE
            build/hive_mind
            build/symbiose_ircd
            build/ChaosLoader.exe
            build/symbiose_ircd.exe
            build/initrd.img
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2: build-kmdf-driver (CI-002)
  # Compiles symbiose_bridge.sys (KMDF 1.33) + SymbioseNull.sys (WDM)
  # Uses Microsoft's official NuGet WDK pattern (packages.config +
  # Directory.Build.props) from github.com/microsoft/Windows-driver-samples
  # ═══════════════════════════════════════════════════════════════════════════
  build-kmdf-driver:
    name: "CI-002 - Build KMDF Driver + WDM Filter"
    needs: [build-docker]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore WDK NuGet packages
        run: nuget restore 02_Symbiose_Bridge\packages.config -PackagesDirectory 02_Symbiose_Bridge\packages
        shell: powershell

      - name: Create test-signing certificate
        run: |
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=SymbioseOS Test" -CertStoreLocation Cert:\CurrentUser\My -NotAfter (Get-Date).AddYears(1)
          $tp = $cert.Thumbprint
          Write-Host "[OK] Test cert created: $tp"
          echo "SIGN_THUMBPRINT=$tp" >> $env:GITHUB_ENV
        shell: powershell

      - name: Build symbiose_bridge.sys (KMDF)
        run: msbuild 02_Symbiose_Bridge/symbiose_bridge.vcxproj /p:Configuration=Release /p:Platform=x64 /p:SignMode=Off
        shell: powershell

      - name: Build SymbioseNull.sys (WDM filter)
        run: msbuild 02_Symbiose_Bridge/SymbioseNull/SymbioseNull.vcxproj /p:Configuration=Release /p:Platform=x64 /p:SignMode=Off
        shell: powershell

      - name: Test-sign drivers (X.20 - SHA256 for pnputil)
        run: |
          # Find signtool from NuGet SDK package (must be x64, not arm64)
          $st = (Get-ChildItem "02_Symbiose_Bridge\packages" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1).FullName
          if (-not $st) {
            $st = (Get-ChildItem "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1).FullName
          }
          $tp = $env:SIGN_THUMBPRINT
          Write-Host "[OK] signtool: $st"
          Write-Host "[OK] cert:     $tp"
          & $st sign /fd sha256 /ph /sha1 $tp "02_Symbiose_Bridge\x64\Release\symbiose_bridge.sys"
          if ($LASTEXITCODE -ne 0) { throw "Failed to sign symbiose_bridge.sys" }
          & $st sign /fd sha256 /ph /sha1 $tp "02_Symbiose_Bridge\SymbioseNull\x64\Release\SymbioseNull.sys"
          if ($LASTEXITCODE -ne 0) { throw "Failed to sign SymbioseNull.sys" }
          Write-Host "[OK] Both drivers test-signed with SHA256"
        shell: powershell

      - name: Verify driver outputs
        run: |
          $drivers = @(
            "02_Symbiose_Bridge/x64/Release/symbiose_bridge.sys",
            "02_Symbiose_Bridge/SymbioseNull/x64/Release/SymbioseNull.sys"
          )
          foreach ($f in $drivers) {
            if (-not (Test-Path $f)) { throw "MISSING: $f" }
            $sz = (Get-Item $f).Length
            Write-Host "[OK] $f - $sz bytes"
          }
        shell: powershell

      - uses: actions/upload-artifact@v4
        with:
          name: drivers
          path: |
            02_Symbiose_Bridge/x64/Release/symbiose_bridge.sys
            02_Symbiose_Bridge/SymbioseNull/x64/Release/SymbioseNull.sys
            02_Symbiose_Bridge/inf/SymbioseNull.inf
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3: build-terminal-ui (CI-005)
  # Tauri 2.0 (Rust + React): SymbioseTerminal.exe
  # Runner: GitHub-hosted Windows (Rust + Node.js via setup actions)
  # ═══════════════════════════════════════════════════════════════════════════
  build-terminal-ui:
    name: "CI-005 · Build SymbioseTerminal.exe (Tauri 2.0)"
    needs: [build-kmdf-driver]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust (MSVC target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "x86_64-pc-windows-msvc"

      - name: Install frontend dependencies
        run: |
          cd 06_Terminal_UI
          npm ci
        shell: powershell

      - name: Build Tauri application
        run: |
          cd 06_Terminal_UI
          npx tauri build --target x86_64-pc-windows-msvc
        shell: powershell

      - name: Verify Terminal UI output
        run: |
          $exe = Get-ChildItem -Path "06_Terminal_UI/src-tauri/target" -Recurse -Filter "*.exe" |
            Where-Object { $_.Name -match "SymbioseTerminal|symbiose" } |
            Select-Object -First 1
          if ($exe) {
            $msg = '[OK] ' + $exe.FullName + ' (' + $exe.Length + ' bytes)'
            Write-Host $msg
          } else {
            # Fallback: check release dir
            $releaseDir = "06_Terminal_UI/src-tauri/target/release"
            if (Test-Path $releaseDir) {
              Get-ChildItem $releaseDir -Filter "*.exe" | ForEach-Object {
                $msg = '[OK] ' + $_.FullName + ' (' + $_.Length + ' bytes)'
                Write-Host $msg
              }
            } else {
              throw "No executable found in Tauri target directory"
            }
          }
        shell: powershell

      - uses: actions/upload-artifact@v4
        with:
          name: terminal-ui
          path: |
            06_Terminal_UI/src-tauri/target/release/*.exe
            06_Terminal_UI/src-tauri/target/x86_64-pc-windows-msvc/release/*.exe
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4: assemble-apbx (CI-004a)
  # Collect Docker artifacts + Terminal UI → stage into APBX layout
  # ═══════════════════════════════════════════════════════════════════════════
  assemble-apbx:
    name: "CI-004 · Assemble APBX Package"
    needs: [build-docker, build-kmdf-driver, build-terminal-ui]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Stage APBX directory
        run: |
          $STAGING = "${{ env.STAGING_DIR }}"

          # Executables/ (from Docker build)
          New-Item -ItemType Directory -Force "$STAGING/Executables" | Out-Null
          Get-ChildItem -Path "artifacts/docker-binaries" -Recurse -Filter "ChaosLoader.exe" |
            Copy-Item -Destination "$STAGING/Executables/"
          Get-ChildItem -Path "artifacts/docker-binaries" -Recurse -Filter "symbiose_ircd.exe" |
            Copy-Item -Destination "$STAGING/Executables/"

          # Executables/ (Terminal UI from Tauri build)
          $tauriExe = Get-ChildItem -Path "artifacts/terminal-ui" -Recurse -Filter "*.exe" | Select-Object -First 1
          if ($tauriExe) {
            Copy-Item $tauriExe.FullName "$STAGING/Executables/SymbioseTerminal.exe"
            Write-Host "  [OK] SymbioseTerminal.exe staged"
          } else {
            Write-Host "  [WARN] SymbioseTerminal.exe not found in artifacts - skipped"
          }

          # Executables/Drivers/ (compiled .sys from CI-002 + INF)
          New-Item -ItemType Directory -Force "$STAGING/Executables/Drivers" | Out-Null
          Get-ChildItem -Path "artifacts/drivers" -Recurse -Filter "symbiose_bridge.sys" |
            Copy-Item -Destination "$STAGING/Executables/Drivers/"
          Get-ChildItem -Path "artifacts/drivers" -Recurse -Filter "symbiose_bridge.cat" |
            Copy-Item -Destination "$STAGING/Executables/Drivers/"
          Get-ChildItem -Path "artifacts/drivers" -Recurse -Filter "SymbioseNull.sys" |
            Copy-Item -Destination "$STAGING/Executables/Drivers/"
          Get-ChildItem -Path "artifacts/drivers" -Recurse -Filter "SymbioseNull.inf" |
            Copy-Item -Destination "$STAGING/Executables/Drivers/"

          # Executables/Kernel/ (from Docker build)
          New-Item -ItemType Directory -Force "$STAGING/Executables/Kernel" | Out-Null
          Get-ChildItem -Path "artifacts/docker-binaries" -Recurse -Filter "BZIMAGE" |
            Copy-Item -Destination "$STAGING/Executables/Kernel/"
          Get-ChildItem -Path "artifacts/docker-binaries" -Recurse -Filter "initrd.img" |
            Copy-Item -Destination "$STAGING/Executables/Kernel/"

          # hive_mind binary
          Get-ChildItem -Path "artifacts/docker-binaries" -Recurse -Filter "hive_mind" |
            Copy-Item -Destination "$STAGING/Executables/"

          # Verify all staged files
          Write-Host ""
          Write-Host "=================================================="
          Write-Host "  APBX Package Contents"
          Write-Host "=================================================="
          $required = @(
            "$STAGING/playbook.conf",
            "$STAGING/Executables/ChaosLoader.exe",
            "$STAGING/Executables/symbiose_ircd.exe",
            "$STAGING/Executables/hive_mind",
            "$STAGING/Executables/SymbioseTerminal.exe",
            "$STAGING/Executables/Drivers/symbiose_bridge.sys",
            "$STAGING/Executables/Drivers/SymbioseNull.sys",
            "$STAGING/Executables/Drivers/SymbioseNull.inf",
            "$STAGING/Executables/Kernel/BZIMAGE",
            "$STAGING/Executables/Kernel/initrd.img",
            "$STAGING/Configuration/main.yml",
            "$STAGING/Configuration/Tasks/ai_act_consensus.yml"
          )
          $pass = 0
          foreach ($f in $required) {
            if (Test-Path $f) {
              $sz = (Get-Item $f).Length
              Write-Host "  [OK] $f - $sz bytes"
              $pass++
            } else {
              Write-Host "  [MISS] $f"
            }
          }
          Write-Host ""
          $msg = 'APBX staged: ' + $pass + '/' + $required.Count + ' files present'
          Write-Host $msg
          if ($pass -lt 7) { throw "Critical files missing from APBX package" }
        shell: powershell

      - uses: actions/upload-artifact@v4
        with:
          name: apbx-staged
          path: ${{ env.STAGING_DIR }}/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 5: seal-and-upload (CI-004b)
  # 7z LZMA2+AES256 seal → GitHub Release on tag push
  # Password: "malte" (playbook.conf)
  # ═══════════════════════════════════════════════════════════════════════════
  seal-and-upload:
    name: "CI-004 · Seal APBX + GitHub Release"
    needs: [assemble-apbx]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: apbx-staged
          path: ${{ env.STAGING_DIR }}/

      - name: Seal .apbx and place in staging folder
        run: |
          $staging = "${{ env.STAGING_DIR }}"
          cd $staging
          # Seal APBX from staging contents
          7z a -t7z -p"${{ env.APBX_PASSWORD }}" -mhe=on -m0=lzma2 -mx=9 `
            Chaos-SymbioseOS.apbx ./*
          # Verify
          7z l -p"${{ env.APBX_PASSWORD }}" Chaos-SymbioseOS.apbx | Select-String "playbook.conf"
          $sz = [math]::Round((Get-Item Chaos-SymbioseOS.apbx).Length / 1MB, 2)
          Write-Host "[OK] Sealed: Chaos-SymbioseOS.apbx ($sz MB)"
          Write-Host "[OK] APBX placed inside staging folder"
        shell: powershell

      # Single artifact: the whole staging folder WITH the .apbx inside
      - name: Upload release folder
        uses: actions/upload-artifact@v4
        with:
          name: Chaos-SymbioseOS-release
          path: ${{ env.STAGING_DIR }}/
          retention-days: 90

      # Create GitHub Release only on tag push (e.g., v3.0.0)
      - name: Create GitHub Release (on tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.STAGING_DIR }}/Chaos-SymbioseOS.apbx
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

