# phase0_config.yml — Phase 0: Hardware Detection & Configuration
#
# Orchestrates: CONFIG-001 through CONFIG-009 (except CONFIG-010/007)
# Runs detection scripts, launches WinForms configurator, writes config.
#
# Reference: Interactive_Plan.md §IX·2 (lines 4382-4387)

title: Phase 0 — Hardware Detection
actions:

  # Step 1: Detect GPUs (CONFIG-001)
  - !writeStatus: {status: 'Enumerating GPUs'}
  - !powerShell:
    command: |
      & (Join-Path $PWD '..\Resources\Detect-GPU.ps1')
    exeDir: true
    wait: true

  # Step 2: Detect Storage (CONFIG-002)
  - !writeStatus: {status: 'Enumerating storage devices'}
  - !powerShell:
    command: |
      & (Join-Path $PWD '..\Resources\Detect-NVMe.ps1')
    exeDir: true
    wait: true

  # Step 3: Detect System Resources (CONFIG-003/004/005)
  - !writeStatus: {status: 'Detecting RAM, CPU, NUMA topology'}
  - !powerShell:
    command: |
      & (Join-Path $PWD '..\Resources\Detect-System.ps1')
    exeDir: true
    wait: true

  # Step 4: Launch WinForms Configurator (CONFIG-003-014)
  - !writeStatus: {status: 'Opening SymbioseOS Hardware Configurator'}
  - !powerShell:
    command: |
      & (Join-Path $PWD '..\Resources\Symbiose-Configurator.ps1')
    exeDir: true
    wait: true

  # Step 5: Assemble Final Config JSON (CONFIG-009)
  - !writeStatus: {status: 'Writing symbiose_config.json'}
  - !powerShell:
    command: |
      & (Join-Path $PWD '..\Resources\Write-SymbioseConfig.ps1')
    exeDir: true
    wait: true

  # Step 6: Persist scripts for post-install reconfiguration
  - !powerShell:
    command: |
      $srcDir = Join-Path $PWD '..\Resources'
      $dstDir = Join-Path $env:ProgramData 'SymbioseOS\Scripts'
      if (-not (Test-Path $dstDir)) {
          New-Item -Path $dstDir -ItemType Directory -Force | Out-Null
      }
      $scripts = @(
          'Detect-GPU.ps1',
          'Detect-NVMe.ps1',
          'Detect-System.ps1',
          'Symbiose-Configurator.ps1',
          'Write-SymbioseConfig.ps1',
          'Reconfigure-Symbiose.ps1'
      )
      foreach ($s in $scripts) {
          $src = Join-Path $srcDir $s
          if (Test-Path $src) {
              Copy-Item $src -Destination $dstDir -Force
              Write-Host ('[PERSIST] Copied: ' + $s)
          }
      }
      Write-Host ('[PERSIST] Scripts saved to: ' + $dstDir) -ForegroundColor Green
      Write-Host '[PERSIST] Run Reconfigure-Symbiose.ps1 anytime to change allocation.' -ForegroundColor Green
    exeDir: true
    wait: true
