# Tasks/kernel_install.yml — Phase 5: Install SymbioseKernel + initramfs
#
# Reference: Interactive_Plan.md §IX·2c
#
# Copies the pre-built BZIMAGE and initrd.img from the .apbx Executables
# directory to the SymbioseOS installation path on the target drive.

actions:
  - !writeStatus: {status: 'Installing SymbioseKernel 64-bit and initramfs'}

  # 1. Create SymbioseOS directory on target drive
  - !powerShell:
      command: |
        $installPath = Join-Path $env:ProgramData 'SymbioseOS\Kernel'
        New-Item -ItemType Directory -Path $installPath -Force | Out-Null
        Write-Host ('[KERNEL] Install path: ' + $installPath)
      weight: 10

  # 2. Copy kernel image
  - !powerShell:
      command: |
        $installPath = Join-Path $env:ProgramData 'SymbioseOS\Kernel'
        $dest = Join-Path $installPath 'BZIMAGE'
        Copy-Item 'Kernel\BZIMAGE' $dest -Force
        $sz = [math]::Round((Get-Item $dest).Length / 1MB, 1)
        Write-Host ('[KERNEL] Installed BZIMAGE: ' + $sz + ' MB')
      weight: 30
      exeDir: true

  # 3. Copy initramfs
  - !powerShell:
      command: |
        $installPath = Join-Path $env:ProgramData 'SymbioseOS\Kernel'
        $dest = Join-Path $installPath 'initrd.img'
        Copy-Item 'Kernel\initrd.img' $dest -Force
        $sz = [math]::Round((Get-Item $dest).Length / 1KB, 1)
        Write-Host ('[KERNEL] Installed initrd.img: ' + $sz + ' KB')
      weight: 30
      exeDir: true

  # 4. Write kernel path to registry for ChaosLoader
  - !registryValue:
      path: 'HKLM\SOFTWARE\SymbioseOS\Kernel'
      value: 'BzImagePath'
      data: '%ProgramData%\SymbioseOS\Kernel\BZIMAGE'
      type: REG_EXPAND_SZ

  - !registryValue:
      path: 'HKLM\SOFTWARE\SymbioseOS\Kernel'
      value: 'InitrdPath'
      data: '%ProgramData%\SymbioseOS\Kernel\initrd.img'
      type: REG_EXPAND_SZ

  # 5. Verify installation
  - !powerShell:
      command: |
        $installPath = Join-Path $env:ProgramData 'SymbioseOS\Kernel'
        $bz = Get-Item (Join-Path $installPath 'BZIMAGE') -ErrorAction SilentlyContinue
        $rd = Get-Item (Join-Path $installPath 'initrd.img') -ErrorAction SilentlyContinue
        if ($bz -and $rd) {
          $bzMb = [math]::Round($bz.Length/1MB,1)
          $rdKb = [math]::Round($rd.Length/1KB,1)
          Write-Host ('[KERNEL] BZIMAGE (' + $bzMb + ' MB) + initrd.img (' + $rdKb + ' KB) installed')
        } else {
          throw 'Kernel installation verification failed'
        }
      weight: 10
