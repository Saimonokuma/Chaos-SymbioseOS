# ══════════════════════════════════════════════════════════════════════════
# llm_download_hf.yml — Phase 4b: Download F32 Model from HuggingFace
#
# Downloads the selected 100B+ F32 model from HuggingFace at install time.
# Model is NOT bundled in the .apbx — fetched live.
#
# Constitutional constraint: F32 only, no quantization (X·5)
#
# Reference: Interactive_Plan.md §IX·2, CONFIG-007
# Option routing: llm-devstral | llm-mistral | llm-mixtral | llm-local
# ══════════════════════════════════════════════════════════════════════════
title: Download F32 Model from HuggingFace
actions:
  # Create model storage directory on NVMe tensor store
  - !cmd:
      command: 'mkdir "%ProgramFiles%\SymbioseOS\Models" 2>NUL'
      weight: 5

  # Read selected model and download using native !powerShell action
  - !powerShell:
    command: |
      $configPath = Join-Path $env:ProgramData 'SymbioseOS\symbiose_config.json'
      if (-not (Test-Path $configPath)) {
          Write-Host '[LLM-DL] No config found - skipping download'
          exit 0
      }
      $config = Get-Content $configPath -Raw | ConvertFrom-Json
      $repoId = $config.llm.hf_repo_id
      if ($repoId -eq 'local' -or $repoId -eq 'LOCAL') {
          Write-Host '[LLM-DL] Local model selected - skipping download.'
          exit 0
      }
      $outDir = Join-Path $env:ProgramFiles 'SymbioseOS\Models'
      if (-not (Test-Path $outDir)) {
          New-Item -Path $outDir -ItemType Directory -Force | Out-Null
      }
      Write-Host ('[LLM-DL] Downloading from HuggingFace: ' + $repoId)
      $apiUrl = 'https://huggingface.co/api/models/' + $repoId
      try {
          $modelInfo = Invoke-RestMethod -Uri $apiUrl
          $stFiles = $modelInfo.siblings | Where-Object { $_.rfilename -match '\.safetensors$' }
          foreach ($f in $stFiles) {
              $url = 'https://huggingface.co/' + $repoId + '/resolve/main/' + $f.rfilename
              $dest = Join-Path $outDir $f.rfilename
              Write-Host ('[LLM-DL] Downloading: ' + $f.rfilename)
              Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          }
          Write-Host '[LLM-DL] Download complete.'
      } catch {
          Write-Error ('[LLM-DL] Download failed: ' + $_)
          Write-Host '[LLM-DL] Model may require HuggingFace token for gated access.'
          exit 1
      }
    wait: true
    timeout: 7200
    weight: 500

  # Record download completion
  - !registryValue: {path: 'HKLM\SOFTWARE\SymbioseOS\LLM', value: 'DownloadComplete', type: REG_DWORD, data: '1'}
