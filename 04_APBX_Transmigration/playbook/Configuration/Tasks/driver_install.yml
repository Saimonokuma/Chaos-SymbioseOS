# ══════════════════════════════════════════════════════════════════════════
# driver_install.yml — Phase 3: KMDF Hypervisor + SymbioseNull Installation
#
# Installs symbiose_bridge.sys (Ring-0 hypervisor) and SymbioseNull.sys
# (NVMe isolation filter) from Executables/Drivers/ into the system.
#
# FIXED: Uses proper PnP Root-enumerated device node instead of raw
# registry entries, so EvtDriverDeviceAdd fires and exposes the device
# interface GUID for ChaosLoader SetupDi discovery.
#
# Reference: Interactive_Plan.md §II·3 Job 1, §III, BRIDGE-011
# Depends: Executables populated by CI-001 (build-kmdf-driver)
# ══════════════════════════════════════════════════════════════════════════
title: Install KMDF Hypervisor Driver
actions:
  # ── Step 1: Copy driver files ───────────────────────────────────────────
  - !cmd:
      command: 'copy /Y "Drivers\symbiose_bridge.sys" "%SystemRoot%\System32\drivers\"'
      weight: 20
      exeDir: true

  - !cmd:
      command: 'copy /Y "Drivers\SymbioseNull.sys" "%SystemRoot%\System32\drivers\"'
      weight: 20
      exeDir: true

  # ── Step 2: Stage signed INF + catalog into driver store ────────────────
  # Uses /force to bypass signature enforcement. If pnputil fails (test
  # signing not yet active), we create a RunOnce entry to retry after reboot.
  - !powerShell:
      command: |
        $exeDir = Split-Path -Parent $MyInvocation.MyCommand.Definition
        if (-not $exeDir) { $exeDir = $PWD.Path }
        $bridgeInf = Join-Path $exeDir 'Drivers\symbiose_bridge.inf'
        $nullInf   = Join-Path $exeDir 'Drivers\SymbioseNull.inf'
        $allOk = $true

        # Stage symbiose_bridge
        Write-Host '[DRIVER] Staging symbiose_bridge.inf...'
        $out = & pnputil /add-driver $bridgeInf /install /force 2>&1
        Write-Host $out
        if ($LASTEXITCODE -ne 0) {
            Write-Warning '[DRIVER] pnputil failed for symbiose_bridge — will retry after reboot'
            $allOk = $false
        }

        # Stage SymbioseNull
        Write-Host '[DRIVER] Staging SymbioseNull.inf...'
        $out = & pnputil /add-driver $nullInf /install /force 2>&1
        Write-Host $out
        if ($LASTEXITCODE -ne 0) {
            Write-Warning '[DRIVER] pnputil failed for SymbioseNull — will retry after reboot'
            $allOk = $false
        }

        # If any staging failed, create RunOnce retry for after reboot
        if (-not $allOk) {
            $retryCmd = "pnputil /add-driver `"$bridgeInf`" /install /force & pnputil /add-driver `"$nullInf`" /install /force"
            $runOncePath = 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\RunOnce'
            Set-ItemProperty -Path $runOncePath -Name 'SymbioseDriverRetry' -Value "cmd /c $retryCmd" -Type String
            Write-Host '[DRIVER] RunOnce retry registered — drivers will be staged after reboot' -ForegroundColor Yellow
        } else {
            Write-Host '[DRIVER] Both drivers staged successfully' -ForegroundColor Green
        }
      exeDir: true
      wait: true
      weight: 30

  # ── Step 4: Create Root-enumerated PnP device node ─────────────────────
  # This is critical: without a PnP device node, EvtDriverDeviceAdd never
  # fires, so the device interface GUID is never exposed, and ChaosLoader
  # cannot discover the device via SetupDi.
  - !powerShell:
      command: |
        $devPath = 'HKLM:\SYSTEM\CurrentControlSet\Enum\Root\SymbioseBridge\0000'
        if (-not (Test-Path $devPath)) {
            New-Item -Path $devPath -Force | Out-Null
        }
        Set-ItemProperty -Path $devPath -Name 'HardwareID' -Value @('Root\SymbioseBridge') -Type MultiString
        Set-ItemProperty -Path $devPath -Name 'CompatibleIDs' -Value @() -Type MultiString
        Set-ItemProperty -Path $devPath -Name 'DeviceDesc' -Value 'SymbioseOS KMDF Hypervisor Bridge' -Type String
        Set-ItemProperty -Path $devPath -Name 'ClassGUID' -Value '{4D36E97D-E325-11CE-BFC1-08002BE10318}' -Type String
        Set-ItemProperty -Path $devPath -Name 'Class' -Value 'System' -Type String
        Set-ItemProperty -Path $devPath -Name 'Service' -Value 'symbiose_bridge' -Type String
        Set-ItemProperty -Path $devPath -Name 'ConfigFlags' -Value 0 -Type DWord
        Set-ItemProperty -Path $devPath -Name 'Capabilities' -Value 0 -Type DWord
        Set-ItemProperty -Path $devPath -Name 'Mfg' -Value 'SymbioseOS' -Type String
        Write-Host '[DRIVER] Root\SymbioseBridge PnP device node created'
      weight: 30

  # ── Step 5: Ensure service entry points to correct binary ───────────────
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\symbiose_bridge', value: 'Type', type: REG_DWORD, data: '1'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\symbiose_bridge', value: 'Start', type: REG_DWORD, data: '1'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\symbiose_bridge', value: 'ErrorControl', type: REG_DWORD, data: '1'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\symbiose_bridge', value: 'ImagePath', type: REG_EXPAND_SZ, data: '\SystemRoot\System32\drivers\symbiose_bridge.sys'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\symbiose_bridge', value: 'DisplayName', type: REG_SZ, data: 'SymbioseOS KMDF Hypervisor Bridge'}

  # ── Step 6: Metadata ────────────────────────────────────────────────────
  - !registryValue: {path: 'HKLM\SOFTWARE\SymbioseOS\Bridge', value: 'DriverInstalled', type: REG_DWORD, data: '1'}
  - !registryValue: {path: 'HKLM\SOFTWARE\SymbioseOS\Bridge', value: 'Version', type: REG_SZ, data: '3.0'}
