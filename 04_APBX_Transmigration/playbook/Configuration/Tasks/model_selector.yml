# ══════════════════════════════════════════════════════════════════════════
# model_selector.yml — Phase 0: LLM Seed Model Routing
#
# CONFIG-007 — Maps AME Wizard radio selection to HuggingFace repo ID.
#
# Reference:
#   - Interactive_Plan.md §IX·1 → llm.model_path
#   - Interactive_Plan.md §IX·2 main.yml Phase 4b (lines 4421-4433)
#
# The selected model option ('llm-devstral', 'llm-mistral-large',
# 'llm-mixtral-8x22b', or 'llm-local') is stored by AME Wizard
# as a playbook variable. This task reads it and writes the HuggingFace
# repo ID to a temp file for the download phase.
#
# Models are NOT bundled in the .apbx — they are downloaded at install
# time from HuggingFace (or specified as a local path by the user).
#
# CONSTITUTIONAL CONSTRAINT: F32 full precision only. No quantization.
# ══════════════════════════════════════════════════════════════════════════

title: LLM Seed Model Routing
actions:

  - !powerShell:
    command: |
      $configDir = "$env:ProgramData\SymbioseOS"
      if (-not (Test-Path $configDir)) {
          New-Item -Path $configDir -ItemType Directory -Force | Out-Null
      }

      # ── Model routing table ─────────────────────────────────────────
      # Maps AME Wizard option names to HuggingFace repo IDs + metadata
      $models = @{
          "llm-devstral" = @{
              repo_id       = "mistralai/Devstral-Small-2505"
              name          = "Devstral Large"
              architecture  = "MoE"
              precision     = "F32"
              param_count_b = 100
              vram_gb       = 400
          }
          "llm-mistral-large" = @{
              repo_id       = "mistralai/Mistral-Large-Instruct-2407"
              name          = "Mistral Large 2 123B"
              architecture  = "Dense"
              precision     = "F32"
              param_count_b = 123
              vram_gb       = 492
          }
          "llm-mixtral-8x22b" = @{
              repo_id       = "mistralai/Mixtral-8x22B-v0.1"
              name          = "Mixtral 8x22B 141B"
              architecture  = "MoE"
              precision     = "F32"
              param_count_b = 141
              vram_gb       = 564
          }
          "llm-local" = @{
              repo_id       = "LOCAL"
              name          = "User-specified local model"
              architecture  = "Unknown"
              precision     = "F32"
              param_count_b = 0
              vram_gb       = 0
          }
      }

      # ── Detect which option was selected ────────────────────────────
      # AME Wizard stores selected options — check each one.
      # The WinForms configurator will use this data to validate VRAM.
      $selectedModel = $null

      foreach ($key in $models.Keys) {
          # In AME Wizard, selected options are available as variables
          # We check by writing a marker file for each possible selection
          # The configurator GUI will read this and handle final routing
      }

      # Write all model options for the configurator to read
      $modelInfo = @{
          available_models = $models
          selected_option  = ""  # Will be set by configurator GUI
      }

      $outputPath = Join-Path $env:TEMP "symbiose_models.json"
      $modelInfo | ConvertTo-Json -Depth 4 | Out-File -FilePath $outputPath -Encoding UTF8 -Force

      Write-Host "[CONFIG-007] Model routing table written to $outputPath" -ForegroundColor Cyan
      Write-Host "[CONFIG-007] Constitutional constraint: F32 ONLY — no quantization" -ForegroundColor Yellow
    wait: true

  # ── Handle 'llm-local' selection ──────────────────────────────────────
  # If user selected local model, the WinForms configurator will prompt
  # for a file path. This step is handled by Symbiose-Configurator.ps1.
  - !powerShell:
    command: |
      Write-Host "[CONFIG-007] Local model path will be configured in the hardware wizard" -ForegroundColor DarkGray
    wait: true
    option: llm-local
