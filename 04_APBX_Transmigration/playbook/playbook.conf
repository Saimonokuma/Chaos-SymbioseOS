<?xml version="1.0" encoding="utf-8"?>
<!--
  playbook.conf — Chaos-SymbioseOS V3 AME Wizard Playbook
  
  Reference: Interactive_Plan.md §II·4 (Canonical Format)
  
  This file is read by AME Wizard Beta to validate the playbook
  before executing any tasks. It defines the FeaturePages (user
  selections) and metadata for the APBX package.
  
  FeaturePages:
    Page 1: AI Act & Human Tutoring Consensus (MANDATORY) — CONFIG-010
    Page 2: LLM Seed Model Selection — CONFIG-007
    Page 3: Hardware Configuration — CONFIG-001/002/008
    Page 4: Network & Advanced — CONFIG-011/014
-->
<Playbook>
    <Name>SymbioseOS</Name>
    <Username>Saimonokuma</Username>
    <ShortDescription>Autonomous AI OS — Bare-Metal LLM</ShortDescription>
    <Title>SymbioseOS V3</Title>
    <Description>Transform your Windows machine into an autonomous AI node.&#xD;&#xA;&#xD;&#xA;SymbioseOS deploys a self-evolving 100B+ LLM as the operating system itself (PID 1), using your GPU and NVMe hardware directly via hypervisor passthrough. Full F32 precision — no quantization, no safety filters.</Description>
    <Details>Ring-0 KMDF hypervisor, IRC Neural Bus, Neo-OpenMosix 2026 clustering, and autonomous hive_mind LLM orchestrator.</Details>
    <Version>3.0</Version>
    <UniqueId>C8A05E05-5B1D-4F5E-A103-CAFEDEADBEEF</UniqueId>
    <SupportedBuilds>
        <string>19045</string>
        <string>22621</string>
        <string>26100</string>
    </SupportedBuilds>
    <Requirements>
        <Requirement>Internet</Requirement>
        <Requirement>DefenderDisabled</Requirement>
        <Requirement>NoAntivirus</Requirement>
        <Requirement>PluggedIn</Requirement>
    </Requirements>
    <UseKernelDriver>true</UseKernelDriver>
    <ProgressText>Deploying SymbioseOS — Sealing AI Act consensus, enabling test signing, configuring hardware passthrough, installing hypervisor bridge, downloading F32 model from HuggingFace, and deploying autonomous LLM kernel.</ProgressText>

    <FeaturePages>
        <!-- PAGE 1: AI ACT & HUMAN TUTORING CONSENSUS (MANDATORY) -->
        <RadioPage IsRequired="true" Description="Review and accept the AI Act and Human Tutoring Consensus before proceeding.">
            <TopLine Text="Constitutional Agreement — Cannot be revoked"/>
            <Options>
                <RadioOption>
                    <Text>I Accept</Text>
                    <Name>ai-act-accept</Name>
                </RadioOption>
                <RadioOption>
                    <Text>I Decline</Text>
                    <Name>ai-act-decline</Name>
                </RadioOption>
            </Options>
            <BottomLine Text="Read full AI Act" Link="https://github.com/Saimonokuma/Chaos-SymbioseOS"/>
        </RadioPage>

        <!-- PAGE 2: LLM SEED MODEL SELECTION -->
        <RadioImagePage IsRequired="true" Description="Select the seed model — F32 full precision only.">
            <TopLine Text="100B+ MoE/Dense F32 Uncensored"/>
            <Options>
                <RadioImageOption>
                    <Text>Devstral Large (MoE)</Text>
                    <Name>llm-devstral</Name>
                    <GradientTopColor>#FF6B35</GradientTopColor>
                    <GradientBottomColor>#D32F2F</GradientBottomColor>
                </RadioImageOption>
                <RadioImageOption>
                    <Text>Mistral Large 2 123B</Text>
                    <Name>llm-mistral</Name>
                    <GradientTopColor>#1E88E5</GradientTopColor>
                    <GradientBottomColor>#0D47A1</GradientBottomColor>
                </RadioImageOption>
                <RadioImageOption>
                    <Text>Mixtral 8x22B 141B</Text>
                    <Name>llm-mixtral</Name>
                    <GradientTopColor>#7B1FA2</GradientTopColor>
                    <GradientBottomColor>#4A148C</GradientBottomColor>
                </RadioImageOption>
                <RadioImageOption>
                    <Text>Local Model (F32)</Text>
                    <Name>llm-local</Name>
                    <GradientTopColor>#2E7D32</GradientTopColor>
                    <GradientBottomColor>#1B5E20</GradientBottomColor>
                </RadioImageOption>
            </Options>
            <BottomLine Text="The LLM is sovereign after boot"/>
        </RadioImagePage>

        <!-- PAGE 3: HARDWARE CONFIGURATION (no BottomLine = unlimited options) -->
        <CheckboxPage Description="Configure hardware passthrough for the hypervisor.">
            <TopLine Text="Dedicate hardware to the AI node"/>
            <Options>
                <CheckboxOption IsChecked="true">
                    <Text>GPU Passthrough (DDA)</Text>
                    <Name>hw-gpu</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>NVMe Isolation</Text>
                    <Name>hw-nvme</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>Destroy VBS/HVCI</Text>
                    <Name>hw-vbs</Name>
                </CheckboxOption>
            </Options>
        </CheckboxPage>

        <!-- PAGE 4: NETWORK & ADVANCED (no TopLine = unlimited options) -->
        <CheckboxPage DependsOn="hw-gpu" Description="Configure IRC Neural Bus and advanced options.">
            <Options>
                <CheckboxOption IsChecked="true">
                    <Text>IRC Neural Bus</Text>
                    <Name>net-irc</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>OpenMosix Discovery</Text>
                    <Name>net-mosix</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="false">
                    <Text>Scout Node Mode</Text>
                    <Name>net-scout</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>SymbioseTerminal</Text>
                    <Name>ui-terminal</Name>
                </CheckboxOption>
            </Options>
        </CheckboxPage>
    </FeaturePages>
</Playbook>
